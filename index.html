<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Process Sharing Game</title>
    <meta
      name="description"
      content="A booth game for IPIC 2026 that demonstrates event-based process sharing through certified container weighing."
    />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon/favicon.svg" />
    <link rel="apple-touch-icon" href="./assets/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="./assets/favicon/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div class="hero__brand">
          <a href="https://www.pilots.community/" target="_blank" rel="noreferrer" aria-label="Visit PILOTS Community website">
            <img
              class="hero__logo"
              src="./assets/pilot-logo-hor-blue.svg"
              alt="PILOTS Community"
            />
          </a>
          <p class="hero__eyebrow">IPIC 2026 Booth Demo</p>
        </div>
        <div class="hero__copy">
          <h1>Process Sharing Game</h1>
          <p>
            Play through a certified container weighing journey and see how event-based
            process sharing keeps every actor aligned.
          </p>
        </div>
        <div class="hero__summary">
          <span class="hero__meta-label">Game Stats</span>
          <div class="hero__controls" aria-label="Game stats and controls">
            <div class="hero-stat" id="header-score" hidden>
              <span>Score</span>
              <strong>-</strong>
            </div>
            <div class="hero-stat hero-stat--mistakes" id="header-mistakes" hidden>
              <span>Mistakes</span>
              <strong>-</strong>
            </div>
            <button type="button" class="button button--primary hero-restart" id="header-restart">
              Restart
            </button>
          </div>
        </div>
      </header>

      <div class="progress-bar" id="progress-bar" aria-label="Process steps">
        <section class="play-panel" id="play-panel" aria-live="polite">
          <div class="loading-state">
            <div class="loading-state__pulse"></div>
            <p>Loading process journey...</p>
          </div>
        </section>
      </div>
    </div>

    <template id="step-template">
      <article class="card step-card">
        <div class="step-card__modal-actions">
          <button type="button" class="button button--ghost step-modal-close" data-action="close-step-modal" aria-label="Close step popover">
            Close
          </button>
        </div>
        <div class="card__header">
          <div class="step-card__heading">
            <div class="step-card__icon-badge" data-role="step-icon"></div>
            <div>
              <p class="section-label" data-role="step-position"></p>
              <h2 data-role="step-title"></h2>
            </div>
          </div>
          <div class="status-chip" data-role="state-transition"></div>
        </div>

        <p class="step-card__prompt" data-role="step-description"></p>

        <div class="detail-grid">
          <div class="detail-pill">
            <span>Performed by</span>
            <strong data-role="performed-by"></strong>
          </div>
          <div class="detail-pill">
            <span>Activity</span>
            <strong data-role="activity"></strong>
          </div>
        </div>

        <form class="step-form" data-role="step-form" novalidate>
          <div class="form-grid" data-role="fields"></div>
          <section class="quiz-block" data-role="quiz-block" hidden>
            <div class="quiz-block__header">
              <p class="section-label">Decision Point</p>
              <h3 data-role="quiz-question"></h3>
            </div>
            <div class="choice-list" data-role="quiz-choices"></div>
            <p class="feedback" data-role="quiz-feedback"></p>
          </section>
          <p class="event-callout" data-role="auto-output" hidden></p>
          <p class="form-error" data-role="form-error"></p>
          <div class="action-row">
            <button type="submit" class="button button--primary" data-role="next-button">
              Continue
            </button>
          </div>
        </form>
      </article>
    </template>

    <template id="summary-template">
      <article class="card summary-card">
        <div class="card__header">
          <div>
            <p class="section-label">Journey Complete</p>
            <h2 data-role="summary-title"></h2>
          </div>
          <div class="score-chip" data-role="summary-score"></div>
        </div>
        <p class="summary-card__lead" data-role="summary-lead"></p>
        <div class="summary-grid" data-role="summary-grid"></div>
        <div class="submission-status" data-role="submission-status"></div>
        <div class="booth-cta" data-role="booth-cta" hidden>
          <p class="booth-cta__emoji" aria-hidden="true">📦</p>
          <div>
            <p class="booth-cta__heading">Come pick up your container!</p>
            <p class="booth-cta__body">Head to the PILOTS IPIC booth and show this screen to a team member to collect your container and learn more about the project.</p>
          </div>
        </div>
        <div class="action-row">
          <button type="button" class="button button--primary" data-action="restart">
            Play Again
          </button>
          <a class="text-link" href="https://www.pilots.community/" target="_blank" rel="noreferrer">
            Explore the PILOTS project
          </a>
        </div>
      </article>
    </template>

    <div class="step-modal" id="step-modal" hidden>
      <div class="step-modal__backdrop" data-action="close-step-modal"></div>
      <div class="step-modal__dialog" id="step-modal-content" role="dialog" aria-modal="true" aria-label="Step question and data entry"></div>
    </div>

    <script src="./config.js"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
